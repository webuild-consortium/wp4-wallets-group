name: Validate CSV on Pull Request

on:
  pull_request:
    branches:
      - main
    paths:
      - 'wallet-capabilities/public/wallet capabilities.csv'
      - 'wallet-capabilities/scripts/validate-csv.mjs'
      - 'wallet-capabilities/package.json'
      - 'wallet-capabilities/package-lock.json'

jobs:
  validate-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: wallet-capabilities/package-lock.json

      - name: Install dependencies
        working-directory: ./wallet-capabilities
        run: npm ci

      - name: Validate CSV data
        working-directory: ./wallet-capabilities
        run: npm run validate
